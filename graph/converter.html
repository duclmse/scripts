<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/mxgraph@4.2.2/javascript/mxClient.min.js"></script>
    <script src="ddl-to-mxgraph.js"></script>
</head>
<body>
    <div id="graphContainer" style="width: 100%; height: 600px;"></div>
    <textarea id="sqlInput" rows="10" cols="50">
        CREATE TABLE users (id INT PRIMARY KEY, name VARCHAR(100));
    </textarea>
    <button onclick="renderDiagram()">Convert to Diagram</button>

    <script>
        function renderDiagram() {
            const sql = document.getElementById('sqlInput').value;
            const result = convertDDLToMxGraph(sql);
            
            if (result.success) {
                // Create mxGraph instance
                const container = document.getElementById('graphContainer');
                const graph = new mxGraph(container);
                
                // Load the generated XML
                const doc = mxUtils.parseXml(result.mxGraphXml);
                const codec = new mxCodec(doc);
                codec.decode(doc.documentElement, graph.getModel());
            }
        }
    </script>
</body>
</html>
